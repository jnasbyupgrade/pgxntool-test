name: Run Tests

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      pgxntool-test-ref:
        description: 'The pgxntool-test ref to check out'
        type: string
        required: true
      pgxntool-branch:
        description: 'The pgxntool branch to check out and use as the local branch name'
        type: string
        required: true
      pgxntool-owner:
        description: 'GitHub account that owns the pgxntool repo to check out. Defaults to this repo owner. Set to the PR head account so a fork PR pulls its paired branch from the same fork.'
        type: string
        required: false
        default: ''
      pgxntool-test-owner:
        description: 'GitHub account that owns the pgxntool-test repo to check out. Defaults to this repo owner.'
        type: string
        required: false
        default: ''

jobs:
  test:
    name: 🐘 PostgreSQL ${{ matrix.pg }}
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    # Caller-controlled inputs are exposed as env vars and referenced as $VARs
    # in run: blocks below, never interpolated directly into the shell.
    env:
      PGXNTOOL_BRANCH: ${{ inputs.pgxntool-branch }}
      PGXNTOOL_TEST_REF: ${{ inputs.pgxntool-test-ref }}
    strategy:
      matrix:
        pg: [17, 16, 15, 14, 13, 12]

    steps:
      - name: Start PostgreSQL ${{ matrix.pg }}
        run: pg-start ${{ matrix.pg }}

      - name: Report CI context
        run: |
          # Print both repos and exact refs at the top of every job so failures
          # are easy to correlate to the right code. This is especially useful
          # when debugging cross-repo issues where the wrong branch was picked.
          # The === BRANCHES: === line is parsed by the CI monitor script.
          echo "=== BRANCHES: pgxntool=${PGXNTOOL_BRANCH} pgxntool-test=${PGXNTOOL_TEST_REF} ==="

      - name: Check out pgxntool-test
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          repository: ${{ inputs.pgxntool-test-owner || github.repository_owner }}/pgxntool-test
          ref: ${{ inputs.pgxntool-test-ref }}
          path: pgxntool-test
          # REQUIRED: pgxntool-test includes BATS as a git submodule at
          # test/bats/. Without this, the submodule directory is empty and
          # every test invocation fails with "bats: command not found" — a
          # confusing error that looks like a PATH issue rather than a missing
          # submodule init.
          submodules: recursive

      - name: Check out pgxntool
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          repository: ${{ inputs.pgxntool-owner || github.repository_owner }}/pgxntool
          ref: ${{ inputs.pgxntool-branch }}
          path: pgxntool
          submodules: false  # pgxntool has no submodules
          # REQUIRED: must be a full clone. 'git subtree add' refuses to work
          # with shallow clones and fails with "shallow roots are not allowed
          # to be updated" — an error that looks like a remote/ref problem
          # rather than a depth issue.
          fetch-depth: 0

      - name: Configure git for CI
        run: |
          # The container may run as a different UID than the user who owns the
          # checkout directories. Without safe.directory, git prints
          # "fatal: dubious ownership" and refuses to operate — causing cryptic
          # test failures unrelated to the actual code being tested.
          git config --global --add safe.directory "$GITHUB_WORKSPACE/pgxntool"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/pgxntool-test"

          # Required for any git operations that create commits inside tests
          # (e.g. the test repo created by foundation.bats).
          git config --global user.email "ci@github-actions"
          git config --global user.name "GitHub Actions"

          # actions/checkout leaves HEAD detached at the PR merge commit.
          # Tests that call 'git subtree add' need a real local branch name,
          # not a detached HEAD. -B force-creates the branch even if it already
          # exists (plain -b errors on existing branches).
          cd pgxntool
          git check-ref-format --branch "$PGXNTOOL_BRANCH" >/dev/null 2>&1 || {
            echo "Invalid branch name: $PGXNTOOL_BRANCH" >&2
            exit 1
          }
          git checkout -B "$PGXNTOOL_BRANCH"

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq rsync jq ruby
          gem install asciidoctor --no-document --quiet
          # rsync: used extensively in test infrastructure (foundation.bats,
          # build_test_repo_from_template, ensure_foundation). Absent rsync
          # causes failures deep inside BATS output that look like test logic
          # problems rather than a missing system dependency.
          #
          # asciidoctor (via gem install, not apt): base.mk searches PATH for
          # 'asciidoctor'. The apt package ruby-asciidoctor installs the gem
          # but its binary lands in the Ruby gems bin dir, which is NOT on PATH
          # in the pgxn-tools container. 'gem install' puts it in /usr/local/bin
          # which IS on PATH. Diagnosed from: "Could not find asciidoc or
          # asciidoctor. Add one of them to your PATH." in base.mk output.
          #
          # jq: required by assert_valid_meta_json(). Listed proactively —
          # pgxn-tools may add it eventually but it is not guaranteed, and the
          # error when it's absent is a cryptic parse failure rather than
          # "jq: not found".

      - name: Pre-install pgtap
        run: |
          # Pre-install pgtap before running tests to prevent a race condition
          # in the concurrent-make-test.bats suite.
          #
          # The test "concurrent make test succeeds for both projects" runs two
          # `make test` processes simultaneously. Both check for
          # $(datadir)/extension/pgtap.control and, finding it absent, both
          # invoke `pgxn install pgtap --sudo` at the same time. Their
          # concurrent `gmake install` calls race to write files into the
          # shared /usr/share/postgresql/<pg>/extension/ directory, causing
          # "File exists" and "No such file or directory" errors.
          #
          # Pre-installing pgtap here ensures the .control file is already
          # present when the concurrent test runs. Both make processes then
          # skip the install (the Make target's prerequisite is already
          # satisfied) and no race occurs.
          pgxn install pgtap --sudo

      - name: Run tests
        working-directory: pgxntool-test
        env:
          # Tell the test infrastructure which pgxntool branch to use.
          # helpers.bash normally auto-detects this via 'git ls-remote', but
          # in CI our pgxntool is checked out at a specific ref, not necessarily
          # the tip of a named remote branch. Setting PGXNBRANCH explicitly
          # bypasses auto-detection and prevents it from choosing the wrong
          # branch or failing on the detached HEAD state.
          PGXNBRANCH: ${{ inputs.pgxntool-branch }}
        run: make test
